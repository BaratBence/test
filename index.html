<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandra Chen | Photography</title>
    <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap)" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <a href="#" class="logo">Alexandra Chen</a>
        <nav>
            <ul>
                <li><a href="#" class="active">Portfolio</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-bg" id="heroBg"></div>
        <h1>Moments</h1>
        <p>Fine Art & Portrait Photography</p>
        <div class="scroll-indicator">
            <span></span>
        </div>
    </section>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="portrait">Portraits</button>
        <button class="filter-btn" data-filter="landscape">Landscapes</button>
        <button class="filter-btn" data-filter="street">Street</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
    </div>

    <main class="gallery-container">
        <div class="loading" id="loading">
            <div class="loader"></div>
            <p>Loading gallery...</p>
        </div>
        <div class="gallery" id="gallery"></div>
    </main>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">×</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">←</button>
        <button class="lightbox-nav lightbox-next" id="lightboxNext">→</button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImg">
            <div class="lightbox-info">
                <h3 id="lightboxTitle"></h3>
                <p id="lightboxCategory"></p>
            </div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="#">Instagram</a>
            <a href="#">Behance</a>
            <a href="#">Twitter</a>
        </div>
        <p>© 2024 Alexandra Chen Photography. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
