<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photomilla</title>
    <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap)" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <a href="#" class="logo">Opauszki Kamilla</a>
        <nav>
            <ul>
                <li><a href="#pictures" class="active">Portfólió</a></li>
                <li><a href="#about">Rólam</a></li>
                <li><a href="#contacts">Elérhetőségek</a></li>
            </ul>
        </nav>
    </header>

    <section id="about" class="hero">
        <div class="hero-bg" id="heroBg"></div>
        <h1>Opauszki Kamilla</h1>
        <p>Profi esküvői és rendezvény fotós</p>
        <div class="scroll-indicator">
            <span></span>
        </div>
    </section>

    <div id="pictures" class="filter-bar">
        <button class="filter-btn active" data-filter="all">Összes</button>
        <button class="filter-btn" data-filter="portrait">Portré</button>
        <button class="filter-btn" data-filter="landscape">Esküvő</button>
        <button class="filter-btn" data-filter="street">Rendezvény</button>
    </div>

    <main class="gallery-container">
        <div class="loading" id="loading">
            <div class="loader"></div>
            <p>Loading gallery...</p>
        </div>
        <div class="gallery" id="gallery"></div>
    </main>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">×</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">←</button>
        <button class="lightbox-nav lightbox-next" id="lightboxNext">→</button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImg">
            <div class="lightbox-info">
                <h3 id="lightboxTitle"></h3>
                <p id="lightboxCategory"></p>
            </div>
        </div>
    </div>

    <footer>
        <div id="contacts" class="social-links">
            <a href="https://www.instagram.com/photomilla/">Instagram</a>
            <a href="https://www.facebook.com/kamilla.opauszki">Facebook</a>
        </div>
        <p>© 2026 Photomilla. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
